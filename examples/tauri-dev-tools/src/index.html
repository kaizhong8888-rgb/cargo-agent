<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="toolbar">
    <div class="toolbar-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-text">Dev Tools</span>
    </div>
    <nav class="toolbar-tabs">
      <button class="tab-btn active" data-tab="dashboard">
        <span>📊</span> 仪表盘
      </button>
      <button class="tab-btn" data-tab="notes">
        <span>📝</span> 笔记
      </button>
      <button class="tab-btn" data-tab="files">
        <span>📁</span> 文件浏览
      </button>
    </nav>
  </header>

  <!-- 主内容区 -->
  <main class="content">
    <!-- ====== 仪表盘 Tab ====== -->
    <section id="dashboard" class="tab-content active">
      <h2>系统信息</h2>
      <div class="info-grid" id="system-info">
        <div class="info-card">
          <div class="info-label">操作系统</div>
          <div class="info-value" id="info-os">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">主机名</div>
          <div class="info-value" id="info-hostname">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">CPU 核心数</div>
          <div class="info-value" id="info-cpu">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">内存总量</div>
          <div class="info-value" id="info-memory">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">Rust 版本</div>
          <div class="info-value" id="info-rust">-</div>
        </div>
        <div class="info-card">
          <div class="info-label">Tauri 目标</div>
          <div class="info-value" id="info-tauri">-</div>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="refreshSystemInfo()">
          🔄 刷新
        </button>
      </div>
    </section>

    <!-- ====== 笔记 Tab ====== -->
    <section id="notes" class="tab-content">
      <div class="notes-layout">
        <!-- 笔记列表 -->
        <aside class="notes-sidebar">
          <div class="sidebar-header">
            <h3>📋 笔记列表</h3>
            <button class="btn btn-sm btn-primary" onclick="showNewNoteForm()">
              ＋ 新建
            </button>
          </div>
          <div class="search-box">
            <input type="text" id="note-search" placeholder="搜索笔记..." oninput="filterNotes()" />
          </div>
          <div class="notes-list" id="notes-list">
            <div class="empty-state">暂无笔记，点击「新建」创建</div>
          </div>
        </aside>

        <!-- 笔记编辑器 -->
        <article class="notes-editor">
          <div id="note-editor-empty" class="empty-state">
            <div class="empty-icon">📝</div>
            <p>选择一篇笔记，或创建新笔记</p>
          </div>

          <div id="note-editor-form" class="hidden">
            <input type="hidden" id="note-id" />
            <input
              type="text"
              id="note-title"
              class="note-title-input"
              placeholder="笔记标题..."
            />
            <textarea
              id="note-content"
              class="note-content-input"
              placeholder="在这里写笔记内容..."
            ></textarea>
            <div class="editor-actions">
              <button class="btn btn-primary" onclick="saveNote()">
                💾 保存
              </button>
              <button class="btn btn-danger" onclick="deleteCurrentNote()">
                🗑️ 删除
              </button>
            </div>
          </div>
        </article>
      </div>
    </section>

    <!-- ====== 文件浏览 Tab ====== -->
    <section id="files" class="tab-content">
      <div class="file-browser">
        <div class="file-path-bar">
          <span>📂 路径：</span>
          <input
            type="text"
            id="file-path"
            value="/"
            class="file-path-input"
            onkeydown="if(event.key==='Enter')browseDirectory()"
          />
          <button class="btn btn-sm btn-primary" onclick="browseDirectory()">
            🔍 浏览
          </button>
          <button class="btn btn-sm" onclick="browseDirectory(getDefaultPath())">
            🏠 首页
          </button>
        </div>

        <div class="file-preview-layout">
          <div class="file-list-container">
            <table class="file-table">
              <thead>
                <tr>
                  <th>名称</th>
                  <th>大小</th>
                  <th>修改时间</th>
                </tr>
              </thead>
              <tbody id="file-list">
                <tr><td colspan="3" class="loading">加载中...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="file-preview" id="file-preview">
            <div class="empty-state">
              <div class="empty-icon">📄</div>
              <p>点击文件查看内容</p>
            </div>
            <pre id="file-content" class="hidden"></pre>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 状态栏 -->
  <footer class="status-bar">
    <span id="status-text">就绪 ✅</span>
    <span id="status-time"></span>
  </footer>

  <script src="main.js"></script>
</body>
</html>
