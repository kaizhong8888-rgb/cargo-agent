{% extends "base.html" %}
{% block title %}{{ t("auth.login") }} - PrintPack{% endblock %}
{% block content %}
<div class="container auth-container">
    <div class="auth-card">
        <h1>{{ t("auth.login") }}</h1>
        {% if error.is_some() %}
        <div class="alert alert-error">{{ error.as_ref().unwrap() }}</div>
        {% endif %}
        <form action="/api/login" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">{{ t("auth.email") }}</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">{{ t("auth.password") }}</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block">{{ t("auth.login") }}</button>
        </form>
        <p class="auth-switch">{{ t("auth.no_account") }} <a href="/register">{{ t("auth.register") }}</a></p>
    </div>
</div>
{% endblock %}
