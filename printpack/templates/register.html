{% extends "base.html" %}
{% block title %}{{ t("register.title") }} - PrintPack{% endblock %}
{% block content %}
<div class="container auth-container">
    <div class="auth-card">
        <h1>{{ t("register.title") }}</h1>
        <p class="auth-subtitle">{{ t("register.subtitle") }}</p>

        <form id="registerForm" class="auth-form" action="/api/register" method="POST">
            <div class="form-group">
                <label for="username">{{ t("register.username") }} *</label>
                <input type="text" id="username" name="username" class="form-control"
                       minlength="3" maxlength="32" required
                       placeholder="{{ t("register.username_hint") }}">
            </div>

            <div class="form-group">
                <label for="email">{{ t("register.email") }} *</label>
                <input type="email" id="email" name="email" class="form-control" required
                       placeholder="{{ t("register.email_hint") }}">
            </div>

            <div class="form-group">
                <label for="phone">{{ t("register.phone") }}</label>
                <input type="tel" id="phone" name="phone" class="form-control"
                       placeholder="{{ t("register.phone_hint") }}">
            </div>

            <div class="form-group">
                <label for="company">{{ t("register.company") }}</label>
                <input type="text" id="company" name="company" class="form-control"
                       placeholder="{{ t("register.company_hint") }}">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">{{ t("register.password") }} *</label>
                    <input type="password" id="password" name="password" class="form-control"
                           minlength="8" required
                           placeholder="{{ t("register.password_hint") }}">
                </div>
                <div class="form-group">
                    <label for="confirm_password">{{ t("register.confirm_password") }} *</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                           minlength="8" required
                           placeholder="{{ t("register.confirm_password_hint") }}">
                </div>
            </div>

            <div class="form-group form-check">
                <input type="checkbox" id="agree_terms" name="agree_terms" required>
                <label for="agree_terms">
                    {{ t("register.agree_terms") }} <a href="/terms">{{ t("register.terms") }}</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">{{ t("register.submit") }}</button>
        </form>

        <div id="registerResult" class="form-result hidden"></div>

        <div class="auth-footer">
            <p>{{ t("register.has_account") }} <a href="/login">{{ t("register.login_link") }}</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;

    if (password !== confirmPassword) {
        const result = document.getElementById('registerResult');
        result.textContent = '{{ t("register.password_mismatch") }}';
        result.className = 'form-result error';
        result.classList.remove('hidden');
        return;
    }

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    delete data.confirm_password;
    delete data.agree_terms;

    try {
        const res = await fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = document.getElementById('registerResult');
        if (res.ok) {
            const json = await res.json();
            result.textContent = '{{ t("register.success") }}';
            result.className = 'form-result success';
            result.classList.remove('hidden');
            setTimeout(() => window.location.href = '/login', 2000);
        } else {
            const json = await res.json();
            result.textContent = json.error || '{{ t("register.error") }}';
            result.className = 'form-result error';
            result.classList.remove('hidden');
        }
    } catch(e) {
        const result = document.getElementById('registerResult');
        result.textContent = '{{ t("register.network_error") }}';
        result.className = 'form-result error';
        result.classList.remove('hidden');
    }
});
</script>
{% endblock %}
