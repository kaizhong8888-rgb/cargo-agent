{% extends "base.html" %}

{% block content %}
<div class="container section">
    <div class="auth-page">
        <div class="auth-page__card">
            <h1>创建账户</h1>
            <p class="auth-page__subtitle">加入 Elegant Lingerie，开启精致生活</p>

            {% if error.is_some() %}
            <div class="alert alert--error">{{ error.as_ref().unwrap() }}</div>
            {% endif %}

            <form action="/register" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" required class="form-control" placeholder="请输入您的姓名">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required class="form-control" placeholder="请输入邮箱地址">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required minlength="6" class="form-control" placeholder="至少6位密码">
                </div>
                <button type="submit" class="btn btn--primary btn--lg btn--block">注册</button>
            </form>

            <p class="auth-page__footer">
                已有账户？<a href="/login">立即登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
