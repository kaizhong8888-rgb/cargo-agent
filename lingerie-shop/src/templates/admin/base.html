<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} - Elegant Lingerie</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="admin-sidebar__logo">
            <span>✦</span>
            <span>管理后台</span>
        </div>
        <nav class="admin-nav">
            <a href="/admin" class="admin-nav__item {% if active == "dashboard" %}active{% endif %}">
                <span>📊</span> 概览
            </a>
            <a href="/admin/products" class="admin-nav__item {% if active == "products" %}active{% endif %}">
                <span>📦</span> 商品管理
            </a>
            <a href="/admin/orders" class="admin-nav__item {% if active == "orders" %}active{% endif %}">
                <span>🛒</span> 订单管理
            </a>
            <a href="/" class="admin-nav__item">
                <span>🏠</span> 返回前台
            </a>
            <a href="/logout" class="admin-nav__item admin-nav__item--danger">
                <span>🚪</span> 退出登录
            </a>
        </nav>
    </aside>
    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
