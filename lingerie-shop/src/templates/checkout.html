{% extends "base.html" %}

{% block content %}
<div class="container section">
    <nav class="breadcrumb">
        <a href="/cart">购物车</a>
        <span>/</span>
        <span>结算</span>
    </nav>

    <div class="checkout-layout">
        <div class="checkout-form">
            <h2>收货信息</h2>
            <form action="/checkout" method="POST" class="form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="shipping_name">收货人姓名</label>
                        <input type="text" id="shipping_name" name="shipping_name" required class="form-control" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label for="shipping_phone">联系电话</label>
                        <input type="tel" id="shipping_phone" name="shipping_phone" required class="form-control" placeholder="请输入手机号">
                    </div>
                </div>
                <div class="form-group">
                    <label for="shipping_address">详细地址</label>
                    <input type="text" id="shipping_address" name="shipping_address" required class="form-control" placeholder="街道地址、门牌号等">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="shipping_city">城市</label>
                        <input type="text" id="shipping_city" name="shipping_city" required class="form-control" placeholder="城市">
                    </div>
                    <div class="form-group">
                        <label for="shipping_state">省份</label>
                        <input type="text" id="shipping_state" name="shipping_state" required class="form-control" placeholder="省份">
                    </div>
                    <div class="form-group">
                        <label for="shipping_zip">邮编</label>
                        <input type="text" id="shipping_zip" name="shipping_zip" class="form-control" placeholder="邮政编码">
                    </div>
                </div>
                <div class="form-group">
                    <label for="shipping_country">国家</label>
                    <input type="text" id="shipping_country" name="shipping_country" value="中国" class="form-control">
                </div>

                <h3 style="margin-top: 2rem;">支付方式</h3>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="stripe" checked>
                        <span class="payment-option__icon">💳</span>
                        <span class="payment-option__label">信用卡/借记卡 (Stripe)</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="paypal">
                        <span class="payment-option__icon">🅿️</span>
                        <span class="payment-option__label">PayPal</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="alipay">
                        <span class="payment-option__icon">🔵</span>
                        <span class="payment-option__label">支付宝</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment_method" value="wechat">
                        <span class="payment-option__icon">🟢</span>
                        <span class="payment-option__label">微信支付</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="notes">备注（可选）</label>
                    <textarea id="notes" name="notes" rows="3" class="form-control" placeholder="订单备注信息"></textarea>
                </div>

                <button type="submit" class="btn btn--primary btn--lg btn--block">提交订单</button>
            </form>
        </div>

        <div class="checkout-summary">
            <h3>订单商品</h3>
            {% for item in items %}
            <div class="checkout-item">
                <div class="checkout-item__info">
                    <span class="checkout-item__name">{{ item.product_name }}</span>
                    <span class="checkout-item__qty">× {{ item.quantity }}</span>
                </div>
                <span class="checkout-item__price">¥{{ "{:.2}".format(item.subtotal()) }}</span>
            </div>
            {% endfor %}
            <hr>
            <div class="checkout-summary__total">
                <span>合计</span>
                <span class="checkout-summary__amount">¥{{ "{:.2}".format(total) }}</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
