{% extends "base.html" %}

{% block content %}
<div class="container section">
    <div class="auth-page">
        <div class="auth-page__card">
            <h1>欢迎回来</h1>
            <p class="auth-page__subtitle">登录您的 Elegant Lingerie 账户</p>

            {% if error.is_some() %}
            <div class="alert alert--error">{{ error.as_ref().unwrap() }}</div>
            {% endif %}

            <form action="/login" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required class="form-control" placeholder="请输入邮箱地址">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required class="form-control" placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn--primary btn--lg btn--block">登录</button>
            </form>

            <p class="auth-page__footer">
                还没有账户？<a href="/register">立即注册</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
